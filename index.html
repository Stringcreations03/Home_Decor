<!DOCTYPE html>
<html lang="gu">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>કાર્ટૂન રિવ્યુ એનિમેશન સિસ્ટમ</title>
  <style>
    /* બેઝિક પેજ સેટિંગ્સ */
    body {
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #f4f7f6;
      overflow-x: hidden;
      height: 100vh;
    }

    /* રિવ્યુ બટન (Floating Button) */
    .review-trigger-btn {
      position: fixed;
      bottom: 20px;
      right: 20px;
      padding: 12px 24px;
      background-color: #ff5722;
      color: white;
      border: none;
      border-radius: 30px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 4px 15px rgba(0,0,0,0.2);
      z-index: 999;
      transition: transform 0.2s;
    }
    .review-trigger-btn:hover {
      transform: scale(1.05);
    }

    /* રિવ્યુ પોપઅપ મોડલ (Popup Modal) */
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.6);
      z-index: 1000;
      justify-content: center;
      align-items: center;
    }
    .modal-content {
      background: white;
      padding: 30px;
      border-radius: 15px;
      width: 90%;
      max-width: 450px;
      box-shadow: 0 5px 25px rgba(0,0,0,0.3);
      position: relative;
      max-height: 85vh;
      overflow-y: auto;
    }
    .close-btn {
      position: absolute;
      top: 15px;
      right: 20px;
      font-size: 28px;
      font-weight: bold;
      cursor: pointer;
      color: #888;
    }
    .close-btn:hover {
      color: #333;
    }
    .modal h2 {
      margin-top: 0;
      color: #333;
      text-align: center;
    }

    /* ફોર્મ સ્ટાઇલ */
    .form-group {
      margin-bottom: 15px;
    }
    .form-group label {
      display: block;
      margin-bottom: 5px;
      font-weight: 600;
      color: #555;
    }
    .form-group input, .form-group textarea, .form-group select {
      width: 100%;
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 8px;
      box-sizing: border-box;
      font-size: 14px;
    }
    .form-group textarea {
      resize: vertical;
      height: 80px;
    }
    .submit-btn {
      width: 100%;
      padding: 12px;
      background-color: #4CAF50;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
      font-weight: bold;
    }
    .submit-btn:hover {
      background-color: #45a049;
    }

    /* ગૂગલ રિવ્યુ વિભાગ */
    .google-section {
      margin-top: 20px;
      border-top: 1px dashed #ccc;
      padding-top: 15px;
      text-align: center;
    }
    .google-link-btn {
      display: inline-block;
      padding: 10px 20px;
      background-color: #4285F4;
      color: white;
      text-decoration: none;
      border-radius: 8px;
      font-weight: bold;
      font-size: 14px;
      margin-top: 8px;
    }
    .google-link-btn:hover {
      background-color: #357ae8;
    }

    /* એનિમેશન કન્ટેનર (બેકગ્રાઉન્ડ લૂપ માટે) */
    #animation-container {
      position: fixed;
      bottom: 50px;
      left: 0;
      width: 100%;
      height: 250px;
      pointer-events: none; /* જેથી વેબસાઇટના અન્ય બટનો ક્લિક કરી શકાય */
      z-index: 10;
      overflow: hidden;
    }

    /* રનર અને કેરેક્ટર એનિમેશન સેટિંગ્સ */
    .review-runner {
      position: absolute;
      display: flex;
      align-items: flex-end;
      white-space: nowrap;
      will-change: transform;
    }

    /* ડાબેથી જમણે જવાની ગતિ (પ્રોગ્રામેટીકલી સેટ થશે છતાં કીફ્રેમ્સ જરૂરી છે) */
    @keyframes walkLeft {
      0% { transform: translateX(100vw); }
      100% { transform: translateX(-100%); }
    }

    /* અલગ-અલગ નખરાં (Antics) માટે કીફ્રેમ્સ */
    @keyframes jump {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-40px); }
    }
    @keyframes wiggle {
      0%, 100% { transform: rotate(-10deg); }
      50% { transform: rotate(10deg); }
    }
    @keyframes spin {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      50% { transform: translateY(-20px) rotate(15deg); }
    }
    @keyframes skip {
      0%, 100% { transform: translateY(0) scaleY(1); }
      50% { transform: translateY(-15px) scaleY(0.85); }
    }

    /* નખરાં ક્લાસ એપ્લાય કરવા માટે */
    .antic-jump { animation: jump 1.5s infinite ease-in-out; }
    .antic-wiggle { animation: wiggle 1s infinite ease-in-out; }
    .antic-spin { animation: spin 2s infinite ease-in-out; }
    .antic-skip { animation: skip 1.2s infinite ease-in-out; }

    /* કેરેક્ટર અને ધ્વજનું માળખું */
    .character-box {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-right: -10px;
    }
    
    /* કેરેક્ટર ઇમેજ અથવા ઇમોજી */
    .character-visual {
      font-size: 50px; /* જો ઇમોજી વાપરો તો */
      width: 80px;
      height: 80px;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .character-visual img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    /* ધ્વજનો લાકડો/પોલ */
    .flag-pole {
      width: 6px;
      height: 140px;
      background: #8B4513; /* કથ્થઈ કલર */
      position: relative;
    }

    /* ધ્વજ (Review Flag) */
    .review-flag {
      position: absolute;
      top: 10px;
      left: 6px;
      background: #ffeb3b;
      border: 3px solid #ff9800;
      padding: 10px 15px;
      border-radius: 4px 20px 20px 4px;
      box-shadow: 3px 3px 8px rgba(0,0,0,0.15);
      max-width: 220px;
      white-space: normal;
      word-wrap: break-word;
    }
    .review-flag .text {
      font-size: 12px;
      font-weight: bold;
      color: #333;
      margin: 0;
    }
    .review-flag .char-name {
      font-size: 10px;
      color: #777;
      margin-top: 5px;
      text-align: right;
      font-style: italic;
    }
  </style>
</head>
<body>

  <!-- રિવ્યુ આપવા માટેનું બટન -->
  <button class="review-trigger-btn" id="open-btn">અહીં રિવ્યુ આપો 💬</button>

  <!-- બેકગ્રાઉન્ડ એનિમેશન એરિયા -->
  <div id="animation-container"></div>

  <!-- પોપઅપ મોડલ -->
  <div class="modal" id="review-modal">
    <div class="modal-content">
      <span class="close-btn" id="close-btn">&times;</span>
      <h2>તમારો અભિપ્રાય આપો</h2>
      
      <form id="review-form">
        <div class="form-group">
          <label for="reviewer-name">તમારું નામ:</label>
          <input type="text" id="reviewer-name" placeholder="તમારું નામ લખો..." required>
        </div>

        <div class="form-group">
          <label for="review-text">રિવ્યુ મેસેજ:</label>
          <textarea id="review-text" placeholder="તમારો સુંદર રિવ્યુ અહીં લખો..." required></textarea>
        </div>

        <div class="form-group">
          <label for="cartoon-select">પસંદગીનું કાર્ટૂન કેરેક્ટર (ફરજિયાત):</label>
          <select id="cartoon-select" required>
            <option value="" disabled selected>-- કેરેક્ટર પસંદ કરો --</option>
            <!-- JS થી ૫૦+ કાર્ટૂન ઉમેરવામાં આવશે -->
          </select>
        </div>

        <button type="submit" class="submit-btn">રિવ્યુ સબમિટ કરો</button>
      </form>

      <!-- ગુગલ રિવ્યુ સેકશન -->
      <div class="google-section">
        <p style="margin: 0; font-size: 14px; color: #555;">અમને ગૂગલ પર સપોર્ટ કરવા માટે નીચે ક્લિક કરો:</p>
        <!-- અહીં YOUR_GOOGLE_REVIEW_LINK_HERE ની જગ્યાએ તમારી લિંક મૂકો -->
        <a href="YOUR_GOOGLE_REVIEW_LINK_HERE" target="_blank" class="google-link-btn">Google Review આપો ⭐️</a>
      </div>
    </div>
  </div>

  <script>
    // ૫૦+ કેરેક્ટર્સનું લિસ્ટ (નામ, ઇમોજી પ્લેસહોલ્ડર, અને જો તમારી પાસે ઈમેજ હોય તો તેનો પાથ)
    const cartoonCharacters = [
      { name: "Tom", emoji: "🐱", img: "" },
      { name: "Jerry", emoji: "🐭", img: "" },
      { name: "Chhota Bheem", emoji: "👦", img: "" },
      { name: "Chutki", emoji: "👧", img: "" },
      { name: "Jaggu", emoji: "🐒", img: "" },
      { name: "Mighty Raju", emoji: "🦸‍♂️", img: "" },
      { name: "Kaliya", emoji: "🧒", img: "" },
      { name: "Dholu-Bholu", emoji: "👬", img: "" },
      { name: "Oggy", emoji: "🐱", img: "" },
      { name: "Jack", emoji: "🐱", img: "" },
      { name: "Dee Dee (Cockroach)", emoji: "🪳", img: "" },
      { name: "Marky (Cockroach)", emoji: "🪳", img: "" },
      { name: "Joey (Cockroach)", emoji: "🪳", img: "" },
      { name: "Bob Dog", emoji: "🐶", img: "" },
      { name: "Blossom (Super Girl 1)", emoji: "💗", img: "" },
      { name: "Bubbles (Super Girl 2)", emoji: "💙", img: "" },
      { name: "Buttercup (Super Girl 3)", emoji: "💚", img: "" },
      { name: "Phineas", emoji: "📐", img: "" },
      { name: "Ferb", emoji: "🔨", img: "" },
      { name: "Candace (Ferb's Sister)", emoji: "👱‍♀️", img: "" },
      { name: "Gwen Tennyson", emoji: "🔮", img: "" },
      { name: "Kevin Levin", emoji: "⛓️", img: "" },
      { name: "Ben Tennyson", emoji: "⌚", img: "" },
      { name: "Grandpa Max", emoji: "👴", img: "" },
      { name: "Finn", emoji: "🗡️", img: "" },
      { name: "Jake", emoji: "🐕", img: "" },
      { name: "Baby Groot", emoji: "🌱", img: "" },
      { name: "Mr. Bean", emoji: "🐻", img: "" },
      { name: "Tun Tun Mausi", emoji: "👵", img: "" },
      { name: "Ninja Hattori", emoji: "🥷", img: "" },
      { name: "Doraemon", emoji: "🔵", img: "" },
      { name: "Nobita", emoji: "🤓", img: "" },
      { name: "Shizuka", emoji: "👧", img: "" },
      { name: "Suneo", emoji: "💇‍♂️", img: "" },
      { name: "Pink Panther", emoji: "🐆", img: "" },
      { name: "Road Runner", emoji: "🐦", img: "" },
      { name: "Shinchan", emoji: "🥔", img: "" },
      { name: "Kazama", emoji: "👦", img: "" },
      { name: "Masao", emoji: "🍙", img: "" },
      { name: "Nene", emoji: "🐰", img: "" },
      { name: "Bochan", emoji: "💧", img: "" },
      { name: "Mickey Mouse", emoji: "🐭", img: "" },
      { name: "Donald Duck", emoji: "🦆", img: "" },
      { name: "Goofy", emoji: "🐶", img: "" },
      { name: "Scooby-Doo", emoji: "🐕", img: "" },
      { name: "Shaggy", emoji: "🧔", img: "" },
      { name: "Bugs Bunny", emoji: "🐰", img: "" },
      { name: "Daffy Duck", emoji: "🦆", img: "" },
      { name: "Popeye", emoji: "💪", img: "" },
      { name: "Pikachu", emoji: "⚡", img: "" },
      { name: "Sonic", emoji: "🦔", img: "" },
      { name: "Mario", emoji: "👨‍🔧", img: "" }
    ];

    // ડિફોલ્ટ રિવ્યુઝ (શરૂઆતમાં સ્ક્રીન પર દેખાડવા માટે)
    let reviewsDatabase = [
      { name: "રાહુલ", text: "ખૂબ જ સરસ અને આકર્ષક વેબસાઈટ છે!", charName: "Tom" },
      { name: "આરતી", text: "મને અહીંનું લુક ખુબ ગમ્યું.", charName: "Jerry" },
      { name: "મિતેશ", text: "બધા જ કાર્ટૂન પાત્રો મજા કરાવી દે છે!", charName: "Chhota Bheem" }
    ];

    // DOM Elements
    const modal = document.getElementById("review-modal");
    const openBtn = document.getElementById("open-btn");
    const closeBtn = document.getElementById("close-btn");
    const cartoonSelect = document.getElementById("cartoon-select");
    const reviewForm = document.getElementById("review-form");
    const animationContainer = document.getElementById("animation-container");

    // ડ્રોપડાઉન લિસ્ટ ભરવું
    cartoonCharacters.forEach(char => {
      const option = document.createElement("option");
      option.value = char.name;
      option.textContent = `${char.emoji} ${char.name}`;
      cartoonSelect.appendChild(option);
    });

    // મોડલ ખોલવા/બંધ કરવાના ઇવેન્ટ્સ
    openBtn.addEventListener("click", () => modal.style.display = "flex");
    closeBtn.addEventListener("click", () => modal.style.display = "none");
    window.addEventListener("click", (e) => {
      if (e.target === modal) modal.style.display = "none";
    });

    // રિવ્યુ સબમિટ હેન્ડલર
    reviewForm.addEventListener("submit", (e) => {
      e.preventDefault();
      
      const name = document.getElementById("reviewer-name").value;
      const text = document.getElementById("review-text").value;
      const charName = cartoonSelect.value;

      const newReview = { name, text, charName };
      reviewsDatabase.push(newReview);

      // ફોર્મ ક્લીયર કરો અને મોડલ બંધ કરો
      reviewForm.reset();
      modal.style.display = "none";

      // નવો રિવ્યુ તુરંત એનિમેશન લૂપમાં મોકલો
      spawnRunner(newReview);
    });

    // નખરાં (Antic Animations) ની યાદી
    const anticAnimations = ["antic-jump", "antic-wiggle", "antic-spin", "antic-skip"];

    // એનિમેશન રનર બનાવવાનું ફંક્શન
    function spawnRunner(reviewData) {
      const characterObj = cartoonCharacters.find(c => c.name === reviewData.charName) || cartoonCharacters[0];
      
      const runner = document.createElement("div");
      runner.className = "review-runner";
      
      // રેન્ડમ સ્પીડ (15 સેકન્ડ થી 25 સેકન્ડ વચ્ચે)
      const speed = Math.random() * 10 + 15; 
      runner.style.animation = `walkLeft ${speed}s linear forwards`;
      
      // સ્ક્રીનની ઊંચાઈ પર રેન્ડમ પોઝિશન (જેથી રિવ્યુ એકબીજાની ઉપર ઓવરલેપ ન થાય)
      const randomY = Math.random() * 80; 
      runner.style.bottom = `${randomY}px`;

      // કેરેક્ટર માટે રેન્ડમ નખરું નક્કી કરવું
      const randomAntic = anticAnimations[Math.floor(Math.random() * anticAnimations.length)];

      // કેરેક્ટર વિઝ્યુઅલ સેટ કરવું (જો ઈમેજ પાથ ખાલી હોય તો ઈમોજી વાપરવું)
      let visualContent = characterObj.emoji;
      if (characterObj.img !== "") {
        visualContent = `<img src="${characterObj.img}" alt="${characterObj.name}">`;
      }

      runner.innerHTML = `
        <div class="character-box ${randomAntic}">
          <div class="character-visual">${visualContent}</div>
          <div class="flag-pole">
            <div class="review-flag">
              <p class="text">"${reviewData.text}"</p>
              <p class="char-name">- ${reviewData.name} (${characterObj.name} સાથે)</p>
            </div>
          </div>
        </div>
      `;

      animationContainer.appendChild(runner);

      // એનિમેશન પૂર્ણ થયા બાદ એલિમેન્ટને ડિલીટ કરી દેવું જેથી મેમરી ન ભરાય
      runner.addEventListener("animationend", () => {
        runner.remove();
      });
    }

    // સતત લૂપ ચલાવવા માટેનું ફંક્શન
    function startReviewLoop() {
      // દર ૬ સેકન્ડે એક નવું કેરેક્ટર રિવ્યુ લઈને દોડશે
      setInterval(() => {
        if (reviewsDatabase.length > 0) {
          const randomIndex = Math.floor(Math.random() * reviewsDatabase.length);
          spawnRunner(reviewsDatabase[randomIndex]);
        }
      }, 6000);
    }

    // પેજ લોડ થતા જ એનિમેશન ચાલુ કરો
    window.onload = () => {
      // શરૂઆતમાં જ ૧-૨ રનર્સ છોડી દેવા જેથી સ્ક્રીન ખાલી ન લાગે
      if (reviewsDatabase.length > 0) {
        spawnRunner(reviewsDatabase[0]);
        setTimeout(() => spawnRunner(reviewsDatabase[1]), 3000);
      }
      startReviewLoop();
    };
  </script>
</body>
</html>
